name: "Publish rpa4all → Google Play"

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track"
        required: true
        default: "internal"
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      release_status:
        description: "Google Play release status"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - draft
          - completed

# Só permite uma publicação por vez
concurrency:
  group: publish-rpa4all
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: "Build & Publish AAB (rpa4all)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: "temurin"
          java-version: 21

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Decode keystore
        run: |
          mkdir -p .keys
          echo "${{ secrets.RPA4ALL_KEYSTORE_BASE64 }}" | base64 -d > .keys/rpa4all-release.jks

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Calculate unique version code
        run: |
          # Use GitHub run number to ensure unique versionCode across builds
          # Keep within Android int32 limit (max 2147483647)
          RUN_NUM=${{ github.run_number }}
          BUILD_OFFSET=$((RUN_NUM % 100000))  # Use last 5 digits to stay within range
          VERSION_CODE=$((33100000 + BUILD_OFFSET))
          echo "RPA4ALL_BUILD_NUMBER=$BUILD_OFFSET" >> $GITHUB_ENV
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "Build #$RUN_NUM (offset: $BUILD_OFFSET) → versionCode=$VERSION_CODE"

      - name: Build signed AAB
        env:
          STORE_PASS: ${{ secrets.RPA4ALL_KEYSTORE_STOREPASS }}
          KEY_PASS: ${{ secrets.RPA4ALL_KEYSTORE_KEYPASS }}
          KEY_ALIAS: ${{ secrets.RPA4ALL_KEYSTORE_ALIAS }}
          RPA4ALL_BUILD_NUMBER: ${{ env.RPA4ALL_BUILD_NUMBER }}
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -XX:+UseParallelGC -XX:MaxMetaspaceSize=512m" >> gradle.properties
          echo "org.gradle.caching=true" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties
          ./gradlew bundleRpa4allRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/.keys/rpa4all-release.jks \
            -Pandroid.injected.signing.store.password="${STORE_PASS}" \
            -Pandroid.injected.signing.key.alias="${KEY_ALIAS}" \
            -Pandroid.injected.signing.key.password="${KEY_PASS}" \
            --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: rpa4all-release-aab
          path: app/build/outputs/bundle/rpa4allRelease/app-rpa4all-release.aab
          retention-days: 30

      - name: Decode Google Play service account
        run: |
          echo "${{ secrets.RPA4ALL_PLAY_SERVICE_ACCOUNT_JSON_B64 }}" | base64 -d > /tmp/service-account.json

      - name: Publish to Google Play (${{ inputs.track }}) as completed
        if: inputs.release_status == 'completed'
        id: publish_completed
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: /tmp/service-account.json
          packageName: com.rpa4all.nextcloud
          releaseFiles: app/build/outputs/bundle/rpa4allRelease/app-rpa4all-release.aab
          track: ${{ inputs.track }}
          status: completed

      - name: Publish to Google Play (${{ inputs.track }}) as draft
        if: inputs.release_status == 'draft'
        id: publish_draft
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: /tmp/service-account.json
          packageName: com.rpa4all.nextcloud
          releaseFiles: app/build/outputs/bundle/rpa4allRelease/app-rpa4all-release.aab
          track: ${{ inputs.track }}
          status: draft

      - name: Publish to Google Play (${{ inputs.track }}) automatically
        if: inputs.release_status == 'auto'
        id: publish_auto_completed
        continue-on-error: true
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: /tmp/service-account.json
          packageName: com.rpa4all.nextcloud
          releaseFiles: app/build/outputs/bundle/rpa4allRelease/app-rpa4all-release.aab
          track: ${{ inputs.track }}
          status: completed

      - name: Fallback publish to Google Play (${{ inputs.track }}) as draft
        if: inputs.release_status == 'auto' && steps.publish_auto_completed.outcome == 'failure'
        id: publish_auto_draft
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: /tmp/service-account.json
          packageName: com.rpa4all.nextcloud
          releaseFiles: app/build/outputs/bundle/rpa4allRelease/app-rpa4all-release.aab
          track: ${{ inputs.track }}
          status: draft

      - name: Resolve effective release status
        if: always()
        id: resolve_release_status
        run: |
          EFFECTIVE_STATUS="${{ inputs.release_status }}"
          if [ "${{ inputs.release_status }}" = "auto" ]; then
            if [ "${{ steps.publish_auto_completed.outcome }}" = "success" ]; then
              EFFECTIVE_STATUS="completed"
            elif [ "${{ steps.publish_auto_draft.outcome }}" = "success" ]; then
              EFFECTIVE_STATUS="draft"
            else
              EFFECTIVE_STATUS="failed"
            fi
          fi
          echo "effective_status=$EFFECTIVE_STATUS" >> "$GITHUB_OUTPUT"

      - name: Publish rollout summary
        if: always()
        run: |
          echo "## RPA4All Play Publish" >> "$GITHUB_STEP_SUMMARY"
          echo "- Package: com.rpa4all.nextcloud" >> "$GITHUB_STEP_SUMMARY"
          echo "- Track: ${{ inputs.track }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Requested release status: ${{ inputs.release_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Effective release status: ${{ steps.resolve_release_status.outputs.effective_status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Version Code: ${{ env.VERSION_CODE }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Build #: ${{ env.RPA4ALL_BUILD_NUMBER }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.track }}" = "internal" ]; then
            echo "- Internal testing URL: https://play.google.com/apps/testing/com.rpa4all.nextcloud" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Send Telegram notification
        if: success() && inputs.track == 'internal'
        run: |
          TESTING_URL="https://play.google.com/apps/testing/com.rpa4all.nextcloud"
          EFFECTIVE_STATUS="${{ steps.resolve_release_status.outputs.effective_status }}"
          if [ "$EFFECTIVE_STATUS" = "completed" ]; then
            MESSAGE="✅ *RPA4All publicado no Google Play Internal*%0A%0A📱 Instale aqui:%0A$TESTING_URL%0A%0A📦 Pacote: com.rpa4all.nextcloud%0A🏷️ Versão: ${{ github.run_number }}"
          else
            MESSAGE="ℹ️ *RPA4All enviado ao Google Play Internal como draft*%0A%0A📱 Link do teste:%0A$TESTING_URL%0A%0A📦 Pacote: com.rpa4all.nextcloud%0A🏷️ Versão: ${{ github.run_number }}%0A📌 Status efetivo: $EFFECTIVE_STATUS"
          fi
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MESSAGE" \
            -d parse_mode="Markdown" || echo "⚠️ Falha ao enviar notificação Telegram (secrets não configurados)"

      - name: Clean up service account key
        if: always()
        run: rm -f /tmp/service-account.json

      - name: Clean up keystore
        if: always()
        run: rm -f .keys/rpa4all-release.jks
