name: "Publish rpa4all → Google Play"

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track"
        required: true
        default: "internal"
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production

# Só permite uma publicação por vez
concurrency:
  group: publish-rpa4all
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: "Build & Publish AAB (rpa4all)"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: "temurin"
          java-version: 21

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Decode keystore
        run: |
          echo "${{ secrets.RPA4ALL_KEYSTORE_BASE64 }}" | base64 -d > .keys/rpa4all-release.jks

      - name: Build signed AAB
        env:
          STORE_PASS: ${{ secrets.RPA4ALL_KEYSTORE_STOREPASS }}
          KEY_PASS: ${{ secrets.RPA4ALL_KEYSTORE_KEYPASS }}
          KEY_ALIAS: ${{ secrets.RPA4ALL_KEYSTORE_ALIAS }}
        run: |
          echo "org.gradle.jvmargs=-Xmx4g -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8 -XX:+UseParallelGC -XX:MaxMetaspaceSize=512m" >> gradle.properties
          echo "org.gradle.caching=true" >> gradle.properties
          echo "org.gradle.parallel=true" >> gradle.properties
          ./gradlew bundleRpa4allRelease \
            -Pandroid.injected.signing.store.file=.keys/rpa4all-release.jks \
            -Pandroid.injected.signing.store.password="${STORE_PASS}" \
            -Pandroid.injected.signing.key.alias="${KEY_ALIAS}" \
            -Pandroid.injected.signing.key.password="${KEY_PASS}" \
            --no-daemon

      - name: Upload AAB artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: rpa4all-release-aab
          path: app/build/outputs/bundle/rpa4allRelease/app-rpa4all-release.aab
          retention-days: 30

      - name: Decode Google Play service account
        run: |
          echo "${{ secrets.RPA4ALL_PLAY_SERVICE_ACCOUNT_JSON }}" > /tmp/service-account.json

      - name: Publish to Google Play (${{ inputs.track }})
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: /tmp/service-account.json
          packageName: com.rpa4all.nextcloud
          releaseFiles: app/build/outputs/bundle/rpa4allRelease/app-rpa4all-release.aab
          track: ${{ inputs.track }}
          status: completed

      - name: Clean up service account key
        if: always()
        run: rm -f /tmp/service-account.json
